<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
    min-height: 100vh;
    color: #1a1a2e;
  }

  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 32px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    height: fit-content;
    max-height: calc(100vh - 120px);
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #e8ecf0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  .input-row input:focus {
    border-color: #4f6ef7;
  }

  .input-row button {
    padding: 10px 20px;
    background: #4f6ef7;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .input-row button:hover { background: #3b54d4; }

  .filters {
    display: flex;
    gap: 6px;
  }

  .filters button {
    flex: 1;
    padding: 7px 0;
    border: none;
    background: #f5f6f8;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #666;
    transition: all 0.15s;
  }

  .filters button.active {
    background: #4f6ef7;
    color: #fff;
  }

  .todo-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .todo-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #f9fafb;
    border-radius: 10px;
    transition: background 0.15s;
  }

  .todo-list li:hover { background: #f0f2f5; }

  .todo-list li.completed .text {
    text-decoration: line-through;
    color: #aaa;
  }

  .todo-list li .text {
    flex: 1;
    font-size: 15px;
    word-break: break-word;
  }

  .todo-list li .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid #d0d5dd;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .todo-list li.completed .checkbox {
    background: #4f6ef7;
    border-color: #4f6ef7;
  }

  .todo-list li.completed .checkbox::after {
    content: "✓";
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .todo-list li .delete {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: #bbb;
    font-size: 18px;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .todo-list li .delete:hover {
    background: #fee2e2;
    color: #ef4444;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #999;
  }

  .footer button {
    background: none;
    border: none;
    color: #999;
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
  }

  .footer button:hover { color: #ef4444; }

  .empty {
    text-align: center;
    color: #bbb;
    padding: 30px 0;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="app">
  <h1>📋 待办事项</h1>

  <div class="input-row">
    <input id="todoInput" type="text" placeholder="添加新任务..." maxlength="200" autofocus>
    <button id="addBtn">添加</button>
  </div>

  <div class="filters">
    <button data-filter="all" class="active">全部</button>
    <button data-filter="active">未完成</button>
    <button data-filter="completed">已完成</button>
  </div>

  <ul class="todo-list" id="todoList"></ul>

  <div class="footer">
    <span id="count">0 项</span>
    <button id="clearCompleted">清除已完成</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'todos';

  let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let filter = 'all';

  const input = document.getElementById('todoInput');
  const addBtn = document.getElementById('addBtn');
  const list = document.getElementById('todoList');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clearCompleted');
  const filterBtns = document.querySelectorAll('.filters button');

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function render() {
    const filtered = filter === 'active'
      ? todos.filter(t => !t.done)
      : filter === 'completed'
        ? todos.filter(t => t.done)
        : todos;

    if (filtered.length === 0) {
      const msg = filter === 'active' ? '没有未完成的任务 🎉' : filter === 'completed' ? '没有已完成的任务' : '还没有任务，添加一个吧';
      list.innerHTML = `<li class="empty">${msg}</li>`;
    } else {
      list.innerHTML = filtered.map((t, i) => {
        const realIndex = todos.indexOf(t);
        return `
          <li class="${t.done ? 'completed' : ''}">
            <span class="checkbox" data-index="${realIndex}"></span>
            <span class="text">${escapeHtml(t.text)}</span>
            <button class="delete" data-index="${realIndex}" title="删除">×</button>
          </li>
        `;
      }).join('');
    }

    const active = todos.filter(t => !t.done).length;
    countEl.textContent = `${active} 项未完成`;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function addTodo() {
    const text = input.value.trim();
    if (!text) return;
    todos.push({ text, done: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  addBtn.addEventListener('click', addTodo);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  list.addEventListener('click', e => {
    const cb = e.target.closest('.checkbox');
    const del = e.target.closest('.delete');
    if (cb) {
      const i = parseInt(cb.dataset.index);
      if (i >= 0 && i < todos.length) {
        todos[i].done = !todos[i].done;
        save();
        render();
      }
    }
    if (del) {
      const i = parseInt(del.dataset.index);
      if (i >= 0 && i < todos.length) {
        todos.splice(i, 1);
        save();
        render();
      }
    }
  });

  clearBtn.addEventListener('click', () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  render();
</script>

</body>
</html>
