<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #fff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --accent: #4f6ef7;
    --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* ── Nav ─────────────────────── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 32px;
    height: 56px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    transition: box-shadow 0.2s;
  }
  nav.scrolled { box-shadow: 0 1px 8px rgba(0,0,0,0.06); }

  nav .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

  nav .links { display: flex; gap: 24px; list-style: none; }
  nav .links a {
    text-decoration: none;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    transition: color 0.15s;
  }
  nav .links a:hover { color: var(--accent); }

  /* ── Sections ─────────────────── */
  section { padding: 80px 32px; }

  .container { max-width: 860px; margin: 0 auto; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .section-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  .btn-add {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px dashed #d0d5dd;
    background: transparent;
    color: #999;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: #eef2ff; }

  /* ── Hero ─────────────────────── */
  #hero {
    padding-top: 136px;
    padding-bottom: 60px;
  }

  #hero .container {
    display: flex;
    align-items: center;
    gap: 36px;
  }

  .avatar {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f6ef7, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: #fff; flex-shrink: 0;
  }

  #hero h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.5px; }
  #hero .subtitle { color: var(--muted); font-size: 17px; margin-top: 6px; }
  #hero .bio { margin-top: 14px; font-size: 15px; color: #555; max-width: 480px; line-height: 1.8; }

  /* ── Projects ─────────────────── */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 18px;
  }

  .project-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .project-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  .project-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; padding-right: 50px; }
  .project-card .desc { font-size: 14px; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }

  .card-actions {
    position: absolute;
    top: 16px; right: 14px;
    display: flex; gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .project-card:hover .card-actions,
  .book-item:hover .card-actions,
  .essay-card:hover .card-actions { opacity: 1; }

  .card-actions button {
    width: 26px; height: 26px;
    border: none; border-radius: 6px;
    background: #f3f4f6;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .card-actions .btn-edit { color: var(--muted); }
  .card-actions .btn-edit:hover { background: #eef2ff; color: var(--accent); }
  .card-actions .btn-del { color: var(--muted); }
  .card-actions .btn-del:hover { background: #fee2e2; color: #ef4444; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: #eef2ff;
    color: #4f6ef7;
    font-weight: 500;
  }

  /* ── Books ────────────────────── */
  .book-list { display: flex; flex-direction: column; gap: 14px; }

  .book-item {
    display: flex;
    gap: 16px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 22px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    align-items: flex-start;
    position: relative;
  }

  .book-cover {
    width: 48px; height: 66px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .book-info { flex: 1; padding-right: 40px; }
  .book-info h4 { font-size: 16px; font-weight: 600; }
  .book-info .author { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .book-info .review { font-size: 14px; color: #555; margin-top: 6px; line-height: 1.6; }

  /* ── Essays ───────────────────── */
  .essay-list { display: flex; flex-direction: column; gap: 12px; }

  .essay-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .essay-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  .essay-card h4 { font-size: 17px; font-weight: 600; padding-right: 50px; }
  .essay-card .date { font-size: 13px; color: #aaa; margin-top: 2px; }
  .essay-card .excerpt { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.6; }

  /* ── Modal ────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.15);
    display: flex; flex-direction: column; gap: 16px;
  }

  .modal h3 { font-size: 20px; font-weight: 700; }

  .modal label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 13px; font-weight: 600; color: #555;
  }

  .modal input, .modal textarea {
    padding: 9px 12px;
    border: 2px solid #e8ecf0;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    transition: border-color 0.15s;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { min-height: 80px; }

  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3b54d4; }
  .btn-cancel { background: #f3f4f6; color: #555; }
  .btn-cancel:hover { background: #e5e7eb; }

  /* ── Footer ───────────────────── */
  footer {
    text-align: center;
    padding: 40px 32px;
    color: #bbb;
    font-size: 13px;
  }

  .empty-hint {
    text-align: center;
    color: #bbb;
    font-size: 14px;
    padding: 24px 0;
  }

  /* ── Responsive ───────────────── */
  @media (max-width: 640px) {
    nav { padding: 0 16px; }
    nav .links { gap: 14px; }
    section { padding: 60px 16px; }
    #hero { padding-top: 110px; }
    #hero .container { flex-direction: column; text-align: center; }
    #hero .bio { margin: 14px auto 0; }
    .project-grid { grid-template-columns: 1fr; }
    .section-title { font-size: 24px; }
    #hero h1 { font-size: 28px; }
    .card-actions { opacity: 1; }
  }
</style>
</head>
<body>

<nav id="nav">
  <span class="logo">My Site</span>
  <ul class="links">
    <li><a href="#projects">项目</a></li>
    <li><a href="#books">阅读</a></li>
    <li><a href="#essays">随笔</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="container">
    <div class="avatar">🦆</div>
    <div>
      <h1>你好，我是 李锐</h1>
      <p class="subtitle">软件工程师 / 鸭王</p>
      <p class="bio">
        擅长做鸭子，写代码。搞过基于 SNN 的项目，把感兴趣的东西都放在这里。
      </p>
    </div>
  </div>
</section>

<section id="projects">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">项目</h2>
      <button class="btn-add" onclick="openModal('project')" title="添加项目">+</button>
    </div>
    <div class="project-grid" id="projectGrid"></div>
  </div>
</section>

<section id="books">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">阅读</h2>
      <button class="btn-add" onclick="openModal('book')" title="添加书籍">+</button>
    </div>
    <div class="book-list" id="bookList"></div>
  </div>
</section>

<section id="essays">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">随笔</h2>
      <button class="btn-add" onclick="openModal('essay')" title="添加随笔">+</button>
    </div>
    <div class="essay-list" id="essayList"></div>
  </div>
</section>

<footer>© 2026 My Site</footer>

<!-- ── Modal ── -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
  // ═══ 数据管理 ═══
  const STORAGE_KEYS = { project: 'site_projects', book: 'site_books', essay: 'site_essays' };

  const DEFAULTS = {
    project: [
      { title: "待办事项应用", desc: "简洁的 Todo 工具，支持筛选和本地存储。", tags: ["HTML", "CSS", "JavaScript"] },
      { title: "个人主页", desc: "也就是你现在看到的这个网站，展示个人信息与作品。", tags: ["HTML", "CSS"] },
      { title: "数据分析脚本", desc: "用 Python 处理实验数据，自动生成可视化图表。", tags: ["Python", "Pandas", "Matplotlib"] },
      { title: "YOLO 目标检测", desc: "基于 YOLOv5 的实时目标检测项目，支持自定义数据集训练。", tags: ["Python", "PyTorch", "YOLOv5"] }
    ],
    book: [
      { title: "深入理解计算机系统", author: "Randal E. Bryant", review: "从硬件到软件，把计算机体系讲得透彻。每次重读都有新收获。", color: "#fef3c7" },
      { title: "人类简史", author: "尤瓦尔·赫拉利", review: "认知革命到科学革命，重新理解人类社会。观点犀利，读完后劲很大。", color: "#e0f2fe" },
      { title: "代码整洁之道", author: "Robert C. Martin", review: "写代码容易，写好代码难。很多关于命名、函数、注释的建议至今受用。", color: "#fce7f3" },
      { title: "设计模式", author: "Erich Gamma 等", review: "GoF 经典，虽然有些模式今天看来过时，但核心思想依然重要。", color: "#e8f5e9" }
    ],
    essay: [
      { title: "为什么要写个人网站", date: "2026-05-10", excerpt: "互联网越来越封闭，拥有一个属于自己的角落变得弥足珍贵。这里没有算法推荐，没有点赞焦虑，只是纯粹的表达。" },
      { title: "学习新技术的三个原则", date: "2026-04-22", excerpt: "不要追热点，先搞清楚它解决了什么问题。用项目驱动学习，而不是看完文档就以为自己会了。教会别人是最好的巩固。" },
      { title: "最近读论文的一点心得", date: "2026-03-15", excerpt: "读论文不能只读结论，方法部分的细节往往才是精华。遇到不懂的公式不要跳过，一步步推导，哪怕很慢。" }
    ]
  };

  const BOOK_COLORS = ["#fef3c7", "#e0f2fe", "#fce7f3", "#e8f5e9", "#ede9fe", "#ffedd5"];

  function load(type) {
    const raw = localStorage.getItem(STORAGE_KEYS[type]);
    if (raw !== null) return JSON.parse(raw);
    // 首次加载，保存默认数据
    save(type, DEFAULTS[type]);
    return DEFAULTS[type];
  }

  function save(type, data) {
    localStorage.setItem(STORAGE_KEYS[type], JSON.stringify(data));
  }

  function getData(type) {
    const map = { project: projects, book: books, essay: essays };
    return map[type];
  }

  function setData(type, data) {
    if (type === 'project') projects = data;
    else if (type === 'book') books = data;
    else if (type === 'essay') essays = data;
    save(type, data);
  }

  // ═══ 初始化数据 ═══
  let projects = load('project');
  let books = load('book');
  let essays = load('essay');

  // ═══ 渲染 ═══
  function renderProjects() {
    const el = document.getElementById('projectGrid');
    if (projects.length === 0) {
      el.innerHTML = '<div class="empty-hint">点击 + 添加你的第一个项目</div>';
      return;
    }
    el.innerHTML = projects.map((p, i) => `
      <div class="project-card">
        <div class="card-actions">
          <button class="btn-edit" onclick="openModal('project',${i})" title="编辑">✎</button>
          <button class="btn-del" onclick="deleteItem('project',${i})" title="删除">×</button>
        </div>
        <h3>${esc(p.title)}</h3>
        <p class="desc">${esc(p.desc)}</p>
        <div class="tags">${p.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
      </div>
    `).join('');
  }

  function renderBooks() {
    const el = document.getElementById('bookList');
    if (books.length === 0) {
      el.innerHTML = '<div class="empty-hint">点击 + 添加你读过的书</div>';
      return;
    }
    el.innerHTML = books.map((b, i) => `
      <div class="book-item">
        <div class="book-cover" style="background:${b.color || BOOK_COLORS[i % BOOK_COLORS.length]}">📖</div>
        <div class="book-info">
          <h4>${esc(b.title)}</h4>
          <p class="author">${esc(b.author)}</p>
          <p class="review">${esc(b.review)}</p>
        </div>
        <div class="card-actions">
          <button class="btn-edit" onclick="openModal('book',${i})" title="编辑">✎</button>
          <button class="btn-del" onclick="deleteItem('book',${i})" title="删除">×</button>
        </div>
      </div>
    `).join('');
  }

  function renderEssays() {
    const el = document.getElementById('essayList');
    if (essays.length === 0) {
      el.innerHTML = '<div class="empty-hint">点击 + 写一篇随笔</div>';
      return;
    }
    el.innerHTML = essays.map((e, i) => `
      <div class="essay-card">
        <div class="card-actions">
          <button class="btn-edit" onclick="openModal('essay',${i})" title="编辑">✎</button>
          <button class="btn-del" onclick="deleteItem('essay',${i})" title="删除">×</button>
        </div>
        <h4>${esc(e.title)}</h4>
        <p class="date">${esc(e.date)}</p>
        <p class="excerpt">${esc(e.excerpt)}</p>
      </div>
    `).join('');
  }

  function renderAll() { renderProjects(); renderBooks(); renderEssays(); }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ═══ 删除 ═══
  function deleteItem(type, index) {
    const data = getData(type);
    if (index < 0 || index >= data.length) return;
    if (!confirm('确定要删除吗？')) return;
    data.splice(index, 1);
    setData(type, data);
    renderAll();
  }

  // ═══ 弹窗 ═══
  let editingType = null;
  let editingIndex = -1;

  function openModal(type, index) {
    editingType = type;
    editingIndex = index !== undefined ? index : -1;
    const isEdit = editingIndex >= 0;
    const data = getData(type);
    const item = isEdit ? data[editingIndex] : null;

    let fields = '';
    if (type === 'project') {
      const tags = isEdit ? item.tags.join('，') : '';
      fields = `
        <label>项目名称<input id="fTitle" value="${isEdit ? esc(item.title) : ''}"></label>
        <label>描述<textarea id="fDesc">${isEdit ? esc(item.desc) : ''}</textarea></label>
        <label>标签（用逗号分隔）<input id="fTags" value="${esc(tags)}" placeholder="HTML, CSS, JavaScript"></label>
      `;
    } else if (type === 'book') {
      fields = `
        <label>书名<input id="fTitle" value="${isEdit ? esc(item.title) : ''}"></label>
        <label>作者<input id="fAuthor" value="${isEdit ? esc(item.author) : ''}"></label>
        <label>简评<textarea id="fReview">${isEdit ? esc(item.review) : ''}</textarea></label>
      `;
    } else if (type === 'essay') {
      const date = isEdit ? item.date : new Date().toISOString().slice(0, 10);
      fields = `
        <label>标题<input id="fTitle" value="${isEdit ? esc(item.title) : ''}"></label>
        <label>日期<input id="fDate" type="date" value="${date}"></label>
        <label>内容摘要<textarea id="fExcerpt">${isEdit ? esc(item.excerpt) : ''}</textarea></label>
      `;
    }

    document.getElementById('modal').innerHTML = `
      <h3>${isEdit ? '编辑' : '添加'}${type === 'project' ? '项目' : type === 'book' ? '书籍' : '随笔'}</h3>
      ${fields}
      <div class="modal-btns">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveItem()">${isEdit ? '保存' : '添加'}</button>
      </div>
    `;
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingType = null;
    editingIndex = -1;
  }

  function saveItem() {
    const data = getData(editingType);
    const isEdit = editingIndex >= 0;

    let item;
    if (editingType === 'project') {
      const raw = document.getElementById('fTags').value;
      const tags = raw ? raw.split(/[,，]/).map(s => s.trim()).filter(Boolean) : [];
      item = {
        title: document.getElementById('fTitle').value.trim(),
        desc: document.getElementById('fDesc').value.trim(),
        tags
      };
    } else if (editingType === 'book') {
      const idx = isEdit ? editingIndex : data.length;
      item = {
        title: document.getElementById('fTitle').value.trim(),
        author: document.getElementById('fAuthor').value.trim(),
        review: document.getElementById('fReview').value.trim(),
        color: BOOK_COLORS[idx % BOOK_COLORS.length]
      };
    } else if (editingType === 'essay') {
      item = {
        title: document.getElementById('fTitle').value.trim(),
        date: document.getElementById('fDate').value,
        excerpt: document.getElementById('fExcerpt').value.trim()
      };
    }

    if (!item.title) { alert('请填写标题'); return; }

    if (isEdit) {
      Object.assign(data[editingIndex], item);
    } else {
      data.push(item);
    }

    save(editingType, data);
    closeModal();
    renderAll();
  }

  // ═══ 导航滚动阴影 ═══
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
  });

  // ═══ 初始渲染 ═══
  renderAll();
</script>

</body>
</html>
